services:
  nginx:
    image: nginx:alpine
    ports:
      - "9527:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - game
    networks:
      - default
      - dokploy-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      PORT: "3000"
      NODE_ENV: production

  game:
    build:
      context: .
      dockerfile: Dockerfile.game
    expose:
      - "8080"
    env_file:
      - path: .env
        required: false

networks:
  dokploy-network:
    external: true
